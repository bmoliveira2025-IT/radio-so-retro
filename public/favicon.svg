<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="46" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
  
  <!-- Inner background circle (semi-transparent) -->
  <circle cx="50" cy="50" r="42" fill="rgba(255,69,0,0.08)"/>

  <!-- Sound wave lines - left -->
  <rect x="12" y="38" width="4" height="24" rx="2" fill="url(#grad1)" opacity="0.9"/>
  <rect x="20" y="30" width="4" height="40" rx="2" fill="url(#grad1)" opacity="0.7"/>
  <rect x="28" y="42" width="4" height="16" rx="2" fill="url(#grad1)" opacity="0.5"/>

  <!-- Sound wave lines - right -->
  <rect x="84" y="38" width="4" height="24" rx="2" fill="url(#grad2)" opacity="0.9"/>
  <rect x="76" y="30" width="4" height="40" rx="2" fill="url(#grad2)" opacity="0.7"/>
  <rect x="68" y="42" width="4" height="16" rx="2" fill="url(#grad2)" opacity="0.5"/>

  <!-- Play triangle (centered) -->
  <polygon points="40,33 40,67 70,50" fill="url(#grad1)"/>

  <!-- Definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
  </defs>
</svg>